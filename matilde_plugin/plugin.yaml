# plugin.yaml — Hermes plugin manifest for Matilde (verifiable citations)
#
# Register the plugin by symlinking it into the agent's plugin dir:
#   ~/.hermes-{agent-name}/plugins/matilde -> /path/to/Matilde/matilde_plugin/
# Then restart the agent (or `hermes plugin reload` if supported).
#
# This directory is self-contained: the citation/OpenNeuro engine lives inside it
# (matilde_plugin/engine/), so copying ONLY this dir is enough to run the plugin.

name: "matilde"

version: "0.1.0"

description: "Matilde — academic research assistant: verifiable citations (Crossref/OpenAlex/DataCite + retraction), legal open-access full-text retrieval (OpenAlex/Unpaywall/arXiv), and OpenNeuro/BIDS dataset discovery."

author: "NimbleCoAI"

kind: standalone

# No credentials required — Crossref, OpenAlex, DataCite, and OpenNeuro's public
# API/S3 are all free and unauthenticated. MATILDE_CONTACT_EMAIL is optional
# (joins providers' polite pools) and is therefore NOT listed as required env.

provides_tools:
  - "matilde_verify_citation"
  - "matilde_verify_bibliography"
  - "matilde_check_retraction"
  - "matilde_openneuro_dataset_info"
  - "matilde_openneuro_search"
  - "matilde_openneuro_list_files"
  - "matilde_fetch_fulltext"
